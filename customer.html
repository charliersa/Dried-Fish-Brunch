<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#1c5e7a" />
  <link rel="manifest" href="manifest.json" />
  <title>顧客點餐 - 小魚乾線上點餐系統</title>
  <style>
    /* 共用樣式由 shared.js 於頁尾注入 */
    .menu-info {
      min-width: 0;
      flex: 1;
    }

    .menu-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 16px;
      font-weight: 700;
      flex-wrap: wrap;
    }

    .menu-price {
      font-size: 14px;
      font-weight: 700;
      color: var(--pink);
    }

    .temp-bar {
      display: flex;
      gap: 6px;
      margin-top: 8px;
    }

    .temp-button {
      border: none;
      border-radius: 999px;
      padding: 4px 12px;
      font-size: 12px;
      font-weight: 700;
      background: #f1f6f9;
      color: #9db4bf;
      cursor: pointer;
    }

    .temp-button.active.cold {
      background: var(--blue-bg);
      color: var(--blue);
    }

    .temp-button.active.hot {
      background: var(--amber-bg);
      color: var(--amber);
    }

    .stepper {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .circle-button {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      border: 1.5px solid var(--line);
      background: #fff;
      color: var(--ink);
      font-size: 18px;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .circle-button.filled {
      border: none;
      background: var(--pink);
      color: #fff;
    }

    .cart-bar {
      position: fixed;
      left: 16px;
      right: 16px;
      bottom: 16px;
      max-width: 608px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border: none;
      background: var(--pink);
      color: #fff;
      padding: 14px 18px;
      border-radius: 18px;
      box-shadow: 0 8px 20px rgba(216, 75, 132, .4);
      z-index: 30;
      cursor: pointer;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(20, 50, 65, .45);
      z-index: 40;
      display: flex;
      align-items: flex-end;
      justify-content: center;
    }

    .sheet {
      width: 100%;
      max-width: 640px;
      background: #f4fafd;
      border-radius: 22px 22px 0 0;
      max-height: 88vh;
      overflow-y: auto;
      padding: 18px 18px 22px;
    }

    .sheet-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .line-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #fff;
      border-radius: 14px;
      padding: 10px 12px;
    }

    .small-button {
      border: none;
      background: none;
      cursor: pointer;
      color: #c9899f;
      font-size: 16px;
    }

    .toggle-row {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }

    .toggle-row button {
      flex: 1;
      gap: 6px;
      border: 2px solid var(--line);
      background: #fff;
      color: var(--ink-soft);
      cursor: pointer;
      font-weight: 700;
      padding: 10px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .toggle-row button.active {
      border-color: var(--pink);
      color: var(--pink-deep);
    }

    .input-group {
      width: 100%;
      border: 1.5px solid var(--line);
      border-radius: 12px;
      padding: 11px 14px;
      font-size: 15px;
      color: var(--ink);
      outline: none;
      background: #fff;
    }

    .button-submit {
      width: 100%;
      margin-top: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border: none;
      background: var(--pink);
      color: #fff;
      font-weight: 900;
      font-size: 17px;
      padding: 14px;
      border-radius: 16px;
      box-shadow: 0 6px 16px rgba(216, 75, 132, .35);
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="page">
    <header>
      <div class="top-row">
        <div class="brand">
          <div class="brand-logo">🐟</div>
          <div class="brand-text">
            <h1>小魚乾早午餐</h1>
            <p>DRIED FISH BRUNCH</p>
          </div>
        </div>
        <div class="info-chip">⏰ 6:00–12:00</div>
      </div>
      <div class="address">📍 台南市東區長東街 106 號 · 現點現做，請耐心等候</div>
      <div class="nav-pills">
        <a href="customer.html" style="background:#fff;color:var(--ink);">🍽️ 顧客點餐</a>
        <a href="kitchen.html">👨‍🍳 廚房後台</a>
        <a href="cashier.html">💰 外場收銀</a>
        <a href="display.html">📺 叫號螢幕</a>
        <a href="admin.html">🔒 管理後台</a>
      </div>
    </header>
    <main id="app"></main>
  </div>

  <div id="cart-bar" class="cart-bar" style="display:none;">
    <span id="cart-info"></span>
    <span style="font-weight:900;">→</span>
  </div>

  <div id="toast" class="toast"></div>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="shared.js"></script>
  <script>document.head.insertAdjacentHTML('beforeend', '<style>' + getSharedStyles() + '</style>');</script>
  <script>
    const app = document.getElementById('app');
    const cartBar = document.getElementById('cart-bar');
    const cartInfo = document.getElementById('cart-info');
    let orders = loadOrders();

    const state = {
      cart: {},
      temp: {},
      diningType: '內用',
      tableInfo: '',
      note: '',
      cartOpen: false,
      currentOrderId: null,
    };

    function cartLines() {
      return Object.values(state.cart);
    }

    function cartCount() {
      return cartLines().reduce((total, line) => total + line.qty, 0);
    }

    function cartTotal() {
      return cartLines().reduce((sum, line) => {
        const item = getItem(line.id);
        return sum + (item ? item.price * line.qty : 0);
      }, 0);
    }

    function renderCustomer() {
      if (state.currentOrderId) {
        const order = orders.find(o => o.id === state.currentOrderId);
        if (order) {
          renderConfirmation(order);
          return;
        }
      }

      const menuSections = CURRENT_MENU.map(category => {
        const items = category.items.filter(it => it.active !== false).map(item => renderMenuItem(category, item)).join('');
        if (!items) return '';
        return `<section class="section"><div class="section-title"><span style="font-size:22px">${category.icon}</span><h2>${category.name}</h2><div class="section-divider"></div></div><div class="grid">${items}</div></section>`;
      }).join('');

      app.innerHTML = `
        <div class="card" style="margin-bottom:18px;background:#fff;box-shadow:0 2px 6px rgba(28,94,122,.07);">
          <div style="display:flex;align-items:center;gap:8px;">
            <span style="font-size:18px">👤</span>
            <input id="phone-member" type="text" placeholder="輸入手機快速帶入常用餐點（會員）" class="input-group" style="border:none;background:transparent;color:var(--ink);flex:1;">
          </div>
        </div>
        ${menuSections}
        ${state.cartOpen ? renderCartSheet() : ''}
      `;

      attachEvents();
    }

    function renderMenuItem(category, item) {
      if (item.soldOut) {
        return `
        <div class="card" style="opacity:.55;">
          <div class="menu-info">
            <div class="menu-title"><span>${item.name}</span><span class="menu-price">$${item.price}</span></div>
          </div>
          <button class="pill-button" disabled style="opacity:.8;cursor:default;">售完</button>
        </div>`;
      }
      const temp = category.temp ? (state.temp[item.id] || '冷') : '';
      const key = item.id + (temp ? '_' + temp : '');
      const qty = state.cart[key] ? state.cart[key].qty : 0;
      const tempButtons = category.temp ? `
        <div class="temp-bar">
          ${['冷', '熱'].map(type => `
            <button class="temp-button ${state.temp[item.id] === type ? 'active ' + (type === '熱' ? 'hot' : 'cold') : ''}" data-action="set-temp" data-id="${item.id}" data-temp="${type}">${type}</button>
          `).join('')}
        </div>
      ` : '';

      return `
        <div class="card">
          <div class="menu-info">
            <div class="menu-title"><span>${item.name}</span><span class="menu-price">$${item.price}</span></div>
            ${tempButtons}
          </div>
          ${qty === 0 ? `
            <button class="button-primary" data-action="add-item" data-id="${item.id}" data-temp="${temp}">＋ 加入</button>
          ` : `
            <div class="stepper">
              <button class="circle-button" data-action="decrease-item" data-key="${key}">－</button>
              <div style="font-weight:900;min-width:18px;text-align:center">${qty}</div>
              <button class="circle-button filled" data-action="add-item" data-id="${item.id}" data-temp="${temp}">＋</button>
            </div>
          `}
        </div>
      `;
    }

    function renderCartSheet() {
      const lines = cartLines();
      const content = lines.length === 0 ? '<div style="color:var(--ink-soft);text-align:center;padding:18px 0;">購物車目前是空的</div>' : lines.map(line => {
        const item = getItem(line.id);
        if (!item) return '';
        return `
          <div class="line-item">
            <div>
              <span style="font-weight:700">${item.name}</span>
              ${line.temp ? `<span style="margin-left:6px;font-size:11px;font-weight:700;padding:2px 8px;border-radius:999px;background:${line.temp === '冷' ? 'var(--blue-bg)' : 'var(--amber-bg)'};color:${line.temp === '冷' ? 'var(--blue)' : 'var(--amber)'}">${line.temp}</span>` : ''}
              <div style="font-size:12px;color:var(--ink-soft);">$${item.price}</div>
            </div>
            <div class="stepper">
              <button class="circle-button" data-action="decrease-item" data-key="${line.id}_${line.temp}">－</button>
              <div style="font-weight:900;min-width:16px;text-align:center">${line.qty}</div>
              <button class="circle-button filled" data-action="add-item" data-id="${line.id}" data-temp="${line.temp}">＋</button>
              <button class="small-button" data-action="remove-item" data-key="${line.id}_${line.temp}">🗑</button>
            </div>
          </div>
        `;
      }).join('');

      return `
        <div class="overlay" data-action="close-sheet">
          <div class="sheet" data-ignore>
            <div class="sheet-header">
              <h3>確認餐點</h3>
              <button data-action="close-sheet" style="border:none;background:none;cursor:pointer;color:var(--ink-soft);font-size:20px;">✕</button>
            </div>
            <div style="display:grid;gap:8px;margin-bottom:16px;">${content}</div>
            <div class="toggle-row">
              <button class="${state.diningType === '內用' ? 'active' : ''}" data-action="set-dining" data-type="內用">🍽️ 內用</button>
              <button class="${state.diningType === '外帶' ? 'active' : ''}" data-action="set-dining" data-type="外帶">🛍️ 外帶</button>
            </div>
            <input id="table-input" class="input-group" placeholder="${state.diningType === '內用' ? '桌號（例：3號桌）' : '取餐名稱（例：小美）'}" value="${escapeHtml(state.tableInfo)}">
            <input id="note-input" class="input-group" placeholder="備註（例：豆漿去冰、不要辣）" value="${escapeHtml(state.note)}" style="margin-top:8px;">
            <button class="button-submit" data-action="submit-order">🔔 送出訂單 · $${cartTotal()}</button>
          </div>
        </div>
      `;
    }

    function renderConfirmation(order) {
      const stepOrder = ['new', 'cook', 'done'];
      const stepMap = {
        new: { label: '新訂單', color: 'var(--amber)', icon: '🔔' },
        cook: { label: '製作中', color: 'var(--blue)', icon: '👨‍🍳' },
        done: { label: '完成', color: 'var(--green)', icon: '✔️' },
      };
      const stepIndex = stepOrder.indexOf(order.status);
      const stepHtml = stepOrder.map((status, index) => {
        const active = index <= stepIndex;
        return `
          <div style="text-align:center;">
            <div class="step-dot" style="background:${active ? stepMap[status].color : '#e6eef2'};width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px;">${stepMap[status].icon}</div>
            <div style="margin-top:4px;font-size:11px;font-weight:700;color:${active ? stepMap[status].color : '#9db4bf'}">${stepMap[status].label}</div>
          </div>
          ${index < stepOrder.length - 1 ? `<div style="flex:1;height:3px;border-radius:2px;background:${index < stepIndex ? stepMap[stepOrder[index + 1]].color : '#e6eef2'};"></div>` : ''}
        `;
      }).join('');

      const itemsHtml = order.items.map(item => `
        <div style="display:flex;align-items:center;justify-content:space-between;font-size:14px;padding:3px 0;">
          <span>${item.name}${item.temp ? `（${item.temp}）` : ''} ×${item.qty}</span>
          <span style="color:var(--ink-soft);">$${item.price * item.qty}</span>
        </div>
      `).join('');

      app.innerHTML = `
        <div>
          <div style="background:#fff;border-radius:22px;padding:24px;box-shadow:0 4px 14px rgba(28,94,122,.1);text-align:center;">
            <div style="font-size:40px;">🐟</div>
            <h2 style="margin:6px 0 2px;font-weight:900;">訂單已送出！</h2>
            <div style="color:var(--ink-soft);font-size:14px;">取餐號碼</div>
            <div style="font-size:40px;font-weight:900;color:var(--pink);letter-spacing:2px;">${order.no}</div>
            <div style="display:flex;align-items:center;gap:4px;margin:18px 4px 8px;flex-wrap:wrap;justify-content:center;">${stepHtml}</div>
            <div style="font-size:13px;color:var(--ink-soft);margin-top:6px;">${order.status === 'done' ? '餐點已完成，請取餐 🎉' : '畫面會自動更新，請留意叫號'}</div>
          </div>
          <div style="background:#fff;border-radius:18px;padding:16px;margin-top:14px;box-shadow:0 2px 6px rgba(28,94,122,.07);">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
              <span style="font-weight:700;">${order.type} · ${escapeHtml(order.table)}</span>
              <span style="color:var(--ink-soft);font-size:13px;">${new Date(order.createdAt).toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit', hour12: false })}</span>
            </div>
            ${itemsHtml}
            ${order.note ? `<div style="font-size:13px;color:var(--amber);margin-top:6px;background:rgba(232,154,43,.1);border-radius:8px;padding:5px 8px;">備註：${escapeHtml(order.note)}</div>` : ''}
            <div style="display:flex;align-items:center;justify-content:space-between;font-weight:900;border-top:1px solid var(--line);margin-top:8px;padding-top:8px;"><span>合計</span><span style="color:var(--pink);">$${order.total}</span></div>
          </div>
          <button class="button-primary" data-action="new-order" style="width:100%;margin-top:14px;background:#fff;color:var(--pink-deep);border:2px solid var(--pink);font-weight:700;">再點一單</button>
        </div>
      `;

      attachEvents();
      updateCartBar();
    }

    function updateCartBar() {
      const count = cartCount();
      if (count > 0) {
        cartBar.style.display = 'flex';
        cartInfo.textContent = `🛒 ${count} 項 · $${cartTotal()}`;
      } else {
        cartBar.style.display = 'none';
      }
    }

    function attachEvents() {
      app.querySelectorAll('[data-action]').forEach(btn => btn.addEventListener('click', handleAction));
      const tableInput = document.getElementById('table-input');
      const noteInput = document.getElementById('note-input');
      if (tableInput) tableInput.addEventListener('input', e => state.tableInfo = e.target.value);
      if (noteInput) noteInput.addEventListener('input', e => state.note = e.target.value);
      cartBar.addEventListener('click', () => {
        state.cartOpen = !state.cartOpen;
        renderCustomer();
      });
    }

    function handleAction(event) {
      const btn = event.currentTarget;
      const action = btn.dataset.action;
      if (!action) return;
      event.stopPropagation();

      if (action === 'add-item') {
        const id = btn.dataset.id;
        const temp = btn.dataset.temp;
        const key = id + (temp ? '_' + temp : '');
        state.cart[key] = state.cart[key] || { id, temp, qty: 0 };
        state.cart[key].qty += 1;
        state.cartOpen = true;
        renderCustomer();
      } else if (action === 'decrease-item') {
        const key = btn.dataset.key;
        if (state.cart[key]) {
          if (state.cart[key].qty <= 1) {
            delete state.cart[key];
          } else {
            state.cart[key].qty -= 1;
          }
          renderCustomer();
        }
      } else if (action === 'remove-item') {
        delete state.cart[btn.dataset.key];
        renderCustomer();
      } else if (action === 'set-temp') {
        state.temp[btn.dataset.id] = btn.dataset.temp;
        renderCustomer();
      } else if (action === 'set-dining') {
        state.diningType = btn.dataset.type;
        renderCustomer();
      } else if (action === 'close-sheet') {
        state.cartOpen = false;
        renderCustomer();
      } else if (action === 'submit-order') {
        submitOrder();
      } else if (action === 'new-order') {
        state.currentOrderId = null;
        state.cart = {};
        state.temp = {};
        state.diningType = '內用';
        state.tableInfo = '';
        state.note = '';
        state.cartOpen = false;
        renderCustomer();
      }
    }

    function submitOrder() {
      if (cartCount() === 0) {
        showMessage('請先加入餐點');
        return;
      }
      const order = {
        id: Date.now() + '_' + Math.floor(Math.random() * 1000),
        no: orderNo(orders),
        type: state.diningType,
        table: state.tableInfo.trim() || (state.diningType === '內用' ? '未填桌號' : '未填名稱'),
        note: state.note.trim(),
        items: cartLines().map(line => {
          const mi = getItem(line.id);
          return { id: line.id, name: mi ? mi.name : '', price: mi ? mi.price : 0, temp: line.temp || '', qty: line.qty };
        }),
        total: cartTotal(),
        status: 'new',
        pay: { method: null, paid: false },
        createdAt: Date.now(),
        updatedAt: Date.now(),
      };
      orders = orders.concat([order]); // 樂觀更新，雲端快照回來後會自動校正
      syncAddOrder(order);
      state.currentOrderId = order.id;
      state.cart = {};
      state.cartOpen = false;
      showMessage('訂單已送出');
      renderCustomer();
    }

    renderCustomer();
    initSync(list => {
      orders = list;
      if (state.currentOrderId) renderCustomer();
    });
    initConfig(() => {
      if (!state.currentOrderId) renderCustomer();
    });

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(err => console.warn('Service Worker failed:', err));
    }
  </script>
</body>
</html>
