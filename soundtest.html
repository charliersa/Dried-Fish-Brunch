<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>聲音測試</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 0; padding: 24px; background: #f4fafd; color: #143241; }
    h1 { font-size: 20px; }
    button { width: 100%; padding: 20px; font-size: 18px; font-weight: 800; border: none; border-radius: 14px; color: #fff; cursor: pointer; margin-bottom: 14px; }
    #beep { background: #e89a2b; }
    #chime { background: #d84b84; }
    #log { background: #fff; border-radius: 12px; padding: 14px; font-size: 13px; line-height: 1.7; white-space: pre-wrap; word-break: break-all; }
    .hint { font-size: 14px; color: #5a7784; margin-bottom: 18px; }
  </style>
</head>
<body>
  <h1>🔊 聲音測試頁</h1>
  <div class="hint">先確認手機/電腦<b>音量開大、沒靜音</b>，然後按下面按鈕。聽得到聲音代表裝置沒問題。</div>
  <button id="beep">① 播放「嗶」一聲（Web Audio 合成）</button>
  <button id="chime">② 播放「叮咚叮」（Web Audio 合成）</button>
  <button id="file" style="background:#3fb27f;">③ 播放音檔（真檔案，後台新版用這個）</button>
  <div id="log">狀態會顯示在這裡…</div>

  <script src="neworder-sound.js"></script>
  <script>
    const logEl = document.getElementById('log');
    let lines = [];
    function log(m) { lines.unshift(m); logEl.textContent = lines.join('\n'); }
    let ctx = null;
    function getCtx() {
      if (!ctx) {
        const AC = window.AudioContext || window.webkitAudioContext;
        if (!AC) { log('❌ 此瀏覽器不支援 Web Audio'); return null; }
        ctx = new AC();
        log('🔧 已建立 AudioContext，取樣率 ' + ctx.sampleRate);
      }
      return ctx;
    }

    document.getElementById('beep').addEventListener('click', () => {
      const c = getCtx(); if (!c) return;
      c.resume().then(() => log('▶ resume 後狀態：' + c.state));
      const osc = c.createOscillator();
      const g = c.createGain();
      osc.type = 'sine'; osc.frequency.value = 880;
      g.gain.setValueAtTime(0.0001, c.currentTime);
      g.gain.exponentialRampToValueAtTime(0.6, c.currentTime + 0.02);
      g.gain.exponentialRampToValueAtTime(0.0001, c.currentTime + 0.5);
      osc.connect(g).connect(c.destination);
      osc.start(); osc.stop(c.currentTime + 0.55);
      log('🔔 已送出「嗶」，狀態=' + c.state + '（若沒聲音→裝置音量/靜音問題）');
      if (navigator.vibrate) navigator.vibrate(120);
    });

    document.getElementById('chime').addEventListener('click', () => {
      const c = getCtx(); if (!c) return;
      c.resume();
      const now = c.currentTime;
      const seq = [880, 1174.66, 1568]; // 與後台相同的簡化版（方波、無壓縮器）
      for (let rep = 0; rep < 2; rep++) {
        seq.forEach((freq, i) => {
          const t0 = now + rep * 0.85 + i * 0.16;
          const osc = c.createOscillator(), g = c.createGain();
          osc.type = 'square'; osc.frequency.value = freq;
          g.gain.setValueAtTime(0.0001, t0);
          g.gain.exponentialRampToValueAtTime(0.4, t0 + 0.02);
          g.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.42);
          osc.connect(g).connect(c.destination);
          osc.start(t0); osc.stop(t0 + 0.46);
        });
      }
      log('🔔 已送出「叮咚叮」（新版方波），狀態=' + c.state);
      if (navigator.vibrate) navigator.vibrate([120, 60, 120, 60, 200]);
    });

    // ③ 真・音檔（後台新版用的方式）
    let _fileAudio = null;
    document.getElementById('file').addEventListener('click', () => {
      if (!window.ALERT_SOUND_URI) { log('❌ 音檔沒載入到（ALERT_SOUND_URI 空）'); return; }
      try {
        if (!_fileAudio) _fileAudio = new Audio(window.ALERT_SOUND_URI);
        _fileAudio.currentTime = 0; _fileAudio.volume = 1;
        const p = _fileAudio.play();
        if (p && p.then) p.then(() => log('🔊 音檔播放中…（若這個有聲音，後台就會有聲音）')).catch(err => log('❌ 音檔播放失敗：' + err.message));
        else log('🔊 音檔已觸發播放');
      } catch (e) { log('❌ 音檔錯誤：' + e.message); }
      if (navigator.vibrate) navigator.vibrate([120, 60, 120, 60, 200]);
    });
  </script>
</body>
</html>
