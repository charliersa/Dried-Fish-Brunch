<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#1c5e7a" />
  <link rel="manifest" href="manifest.json" />
  <title>管理後台 - 小魚乾線上點餐系統</title>
  <style>
    /* 共用樣式由 shared.js 於頁尾注入 */
    .admin-card {
      background: #fff;
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 2px 6px rgba(28, 94, 122, .06);
      margin-bottom: 14px;
    }

    .admin-card h3 {
      margin: 0 0 14px;
      font-size: 15px;
      font-weight: 900;
    }

    .admin-cols {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 14px;
    }

    .bar-chart {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      height: 140px;
    }

    .bar-chart .bar-col {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      height: 100%;
    }

    .bar-chart .bar {
      width: 100%;
      max-width: 34px;
      border-radius: 6px 6px 0 0;
      background: linear-gradient(180deg, #6fb7d0, #3e9bd1);
      min-height: 2px;
      transition: height .3s ease;
    }

    .bar-val {
      font-size: 10px;
      color: var(--ink-soft);
      margin-bottom: 4px;
    }

    .bar-label {
      font-size: 11px;
      color: #9db4bf;
      margin-top: 6px;
    }

    .rank-row {
      margin-bottom: 11px;
    }

    .rank-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 13px;
      margin-bottom: 4px;
    }

    .rank-head b {
      font-weight: 700;
    }

    .rank-track {
      background: #eef5f8;
      border-radius: 4px;
      height: 8px;
      overflow: hidden;
    }

    .rank-fill {
      height: 100%;
      border-radius: 4px;
      background: linear-gradient(90deg, #ec6398, #d84b84);
    }

    .admin-tabs {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      margin-bottom: 16px;
      padding-bottom: 2px;
    }

    .admin-tab {
      flex-shrink: 0;
      white-space: nowrap;
      border: 1.5px solid var(--line);
      background: #fff;
      color: var(--ink-soft);
      cursor: pointer;
      font-size: 14px;
      font-weight: 700;
      padding: 9px 18px;
      border-radius: 999px;
    }

    .admin-tab.active {
      border: none;
      background: var(--ink);
      color: #fff;
    }

    .ent-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      background: #fff;
      border-radius: 14px;
      padding: 11px 13px;
      margin-bottom: 8px;
      flex-wrap: wrap;
      box-shadow: 0 2px 6px rgba(28, 94, 122, .05);
    }

    .ent-row.low {
      border: 1.5px solid #f2c4be;
    }

    .mini-btn {
      border: 1.5px solid var(--line);
      background: #fff;
      color: var(--ink-soft);
      cursor: pointer;
      font-size: 12px;
      font-weight: 700;
      padding: 6px 10px;
      border-radius: 999px;
    }

    .badge {
      font-size: 11px;
      font-weight: 700;
      padding: 3px 9px;
      border-radius: 999px;
    }

    .add-btn {
      border: none;
      background: var(--pink);
      color: #fff;
      cursor: pointer;
      font-size: 13px;
      font-weight: 700;
      padding: 8px 14px;
      border-radius: 999px;
    }

    .hist-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    .hist-table th,
    .hist-table td {
      text-align: left;
      padding: 8px 6px;
      border-bottom: 1px solid #eef5f8;
    }

    .hist-table th {
      color: var(--ink-soft);
      font-size: 12px;
    }

    /* PIN 鎖畫面 */
    .pin-overlay {
      position: fixed;
      inset: 0;
      background: rgba(20, 50, 65, .5);
      z-index: 60;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .pin-box {
      background: #fff;
      border-radius: 20px;
      padding: 24px;
      width: 100%;
      max-width: 340px;
      box-shadow: 0 12px 34px rgba(0, 0, 0, .22);
      text-align: center;
    }

    .pin-box input {
      width: 100%;
      box-sizing: border-box;
      text-align: center;
      letter-spacing: 6px;
      border: 1.5px solid var(--line);
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 18px;
      color: var(--ink);
      outline: none;
    }

    .pin-err {
      font-size: 13px;
      color: #e5534b;
      font-weight: 700;
      margin-top: 8px;
    }

    .pin-actions {
      display: flex;
      gap: 10px;
      margin-top: 16px;
    }

    .pin-actions button {
      flex: 1;
      cursor: pointer;
      font-weight: 900;
      padding: 11px;
      border-radius: 12px;
      border: none;
    }
  </style>
</head>
<body>
  <div class="page">
    <header>
      <div class="top-row">
        <div class="brand">
          <div class="brand-logo">🐟</div>
          <div class="brand-text">
            <h1>小魚乾早午餐</h1>
            <p>DRIED FISH BRUNCH</p>
          </div>
        </div>
        <div class="info-chip">⏰ 6:00–12:00</div>
      </div>
      <div class="address">📍 台南市東區長東街 106 號 · 現點現做，請耐心等候</div>
      <div class="nav-pills">

  <style>
    #print-area { display: none; }
    /* 螢幕上的列印預覽：先看再按「列印 / 另存 PDF」 */
    body.preview-open { overflow: hidden; }
    body.preview-open #print-area { display: block; position: fixed; inset: 0; z-index: 200; background: #fff; overflow: auto; padding: 0 24px 32px; }
    .rpt-toolbar { position: sticky; top: 0; background: #fff; border-bottom: 1px solid #e3eef3; padding: 12px 0; margin-bottom: 8px; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .rpt-toolbar button { border: none; border-radius: 999px; padding: 9px 16px; font-weight: 800; font-size: 14px; cursor: pointer; }
    .rpt-toolbar .rpt-hint { font-size: 12px; color: #888; }
    #print-area .rpt-h1 { font-size: 22px; color: #1c5e7a; border-bottom: 3px solid #ec6398; padding-bottom: 6px; margin: 0 0 4px; }
    #print-area .rpt-h2 { font-size: 16px; color: #1c5e7a; border-left: 5px solid #ec6398; padding-left: 8px; margin: 16px 0 6px; }
    #print-area .rpt-sub { color: #666; margin-bottom: 8px; font-size: 12px; }
    #print-area table { border-collapse: collapse; width: 100%; margin: 6px 0; font-size: 12px; }
    #print-area th, #print-area td { border: 1px solid #999; padding: 5px 7px; text-align: left; vertical-align: top; }
    #print-area th { background: #eee; }
    @media print {
      body > .page, #toast { display: none !important; }
      body.preview-open { overflow: visible !important; }
      #print-area { display: block !important; position: static !important; padding: 0 !important; overflow: visible !important; }
      .rpt-toolbar { display: none !important; }
      @page { margin: 12mm; }
    }
  </style>
  <div id="print-area"></div>

  <div id="toast" class="toast"></div>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="shared.js"></script>
  <script>document.head.insertAdjacentHTML('beforeend', '<style>' + getSharedStyles() + '</style>');</script>
  <script>
    const app = document.getElementById('app');
    let orders = loadOrders();
    let unlocked = false;

    // 管理後台登入：簡易密碼（登入狀態存 localStorage，登出清除）
    const ADMIN_PW = '2026';
    const ADMIN_AUTH_KEY = 'xyg-admin-auth';

    // 建立 品項id -> 分類 對照
    const ITEM_CAT = {};
    MENU.forEach(cat => cat.items.forEach(item => { ITEM_CAT[item.id] = cat; }));

    function renderStat(label, value, color) {
      return `
        <div class="stat-card">
          <div style="font-size:24px;font-weight:900;color:${color || 'var(--ink)'};">${value}</div>
          <div style="font-size:12px;color:var(--ink-soft);margin-top:2px;">${label}</div>
        </div>
      `;
    }

    function renderLogin(errMsg) {
      app.innerHTML = `
        <div class="pin-overlay">
          <div class="pin-box">
            <div style="font-size:34px;">🔐</div>
            <h3 style="font-size:18px;font-weight:900;margin:6px 0 2px;">管理後台登入</h3>
            <div style="font-size:13px;color:var(--ink-soft);margin-bottom:16px;">請輸入管理密碼</div>
            <input id="login-pw" type="password" inputmode="numeric" placeholder="密碼" autocomplete="current-password" style="text-align:left;letter-spacing:normal;" />
            <div id="login-err" class="pin-err" style="display:${errMsg ? 'block' : 'none'};">${errMsg || ''}</div>
            <div class="pin-actions">
              <a href="customer.html" style="flex:1;border:1.5px solid var(--line);background:#fff;color:var(--ink-soft);font-weight:700;padding:11px;border-radius:12px;text-decoration:none;display:flex;align-items:center;justify-content:center;">返回</a>
              <button id="login-submit" style="background:var(--pink);color:#fff;">登入</button>
            </div>
          </div>
        </div>
      `;
      const pw = document.getElementById('login-pw');
      const btn = document.getElementById('login-submit');
      const submit = () => {
        if (pw.value === ADMIN_PW) {
          unlocked = true;
          try { localStorage.setItem(ADMIN_AUTH_KEY, '1'); } catch (e) {}
          renderAdmin();
        } else {
          renderLogin('密碼錯誤');
        }
      };
      btn.addEventListener('click', submit);
      pw.addEventListener('keydown', e => { if (e.key === 'Enter') submit(); });
      pw.focus();
    }

    function renderOffline() {
      app.innerHTML = `
        <div class="pin-overlay">
          <div class="pin-box">
            <div style="font-size:34px;">📡</div>
            <h3 style="font-size:18px;font-weight:900;margin:6px 0 2px;">需要連線</h3>
            <div style="font-size:13px;color:var(--ink-soft);margin-bottom:16px;">管理後台需要連線並登入才能使用</div>
            <div class="pin-actions">
              <a href="customer.html" style="flex:1;border:1.5px solid var(--line);background:#fff;color:var(--ink-soft);font-weight:700;padding:11px;border-radius:12px;text-decoration:none;display:flex;align-items:center;justify-content:center;">返回</a>
            </div>
          </div>
        </div>
      `;
    }

    function barChart(rows, fmt) {
      const max = Math.max(1, ...rows.map(r => r.value));
      return `<div class="bar-chart">${rows.map(r => `
        <div class="bar-col">
          <div class="bar-val">${fmt ? fmt(r.value) : r.value}</div>
          <div class="bar" style="height:${Math.round(r.value / max * 100)}%;"></div>
          <div class="bar-label">${r.label}</div>
        </div>`).join('')}</div>`;
    }

    function rankList(rows, fmt, emptyText) {
      if (rows.length === 0) {
        return `<div style="color:#9db4bf;font-size:14px;padding:10px 0;">${emptyText}</div>`;
      }
      const max = Math.max(1, ...rows.map(r => r.value));
      return rows.map(r => `
        <div class="rank-row">
          <div class="rank-head"><b>${escapeHtml(r.name)}</b><span style="color:var(--ink-soft);">${fmt(r.value)}</span></div>
          <div class="rank-track"><div class="rank-fill" style="width:${Math.round(r.value / max * 100)}%;"></div></div>
        </div>
      `).join('');
    }

    // ===== 管理後台狀態 =====
    let cfg = { menu: CURRENT_MENU, ent: JSON.parse(JSON.stringify(DEFAULT_ENT)) };
    let aTab = 'revenue';
    let editItem = null; // 菜單品項編輯
    let autoSaveStatus = ''; // '' | 'saving' | 'saved'（品項彈窗的自動儲存狀態）
    let editEnt = null;  // 員工/食材/設備/成本編輯
    let histScope = 'today';
    let reportPeriod = 'day'; // 報表期間：day | week | month

    const ADMIN_TABS = [
      { k: 'revenue', label: '營收管理' }, { k: 'ops', label: '營運管理' }, { k: 'cost', label: '成本管理' },
      { k: 'payroll', label: '薪資管理' }, { k: 'ing', label: '食材管理' }, { k: 'equip', label: '設備管理' },
      { k: 'menu', label: '菜單管理' }, { k: 'history', label: '歷史訂單' },
    ];

    const money = n => '$' + (n || 0).toLocaleString();
    const fmtTime = ts => new Date(ts).toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit', hour12: false });
    const fmtDate = ts => new Date(ts).toLocaleDateString('zh-TW', { month: '2-digit', day: '2-digit' });
    const STATUS = {
      new: { label: '新訂單', color: '#E89A2B', bg: '#FCF1DC' },
      cook: { label: '製作中', color: '#3E9BD1', bg: '#E3F1FB' },
      done: { label: '完成', color: '#3FA877', bg: '#E1F4EA' },
    };
    const isPaid = o => !!(o.pay && o.pay.paid);
    const nameOf = it => it.name || (getItem(it.id) ? getItem(it.id).name : '(未知)');
    const priceOf = it => (it.price != null ? it.price : (getItem(it.id) ? getItem(it.id).price : 0));
    const dayKey = ts => { const d = new Date(ts); return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0'); };
    // 預設 Google Sheet 同步網址（Apps Script Web App）；後台欄位有填則以欄位為準
    const DEFAULT_SHEET_URL = 'https://script.google.com/macros/s/AKfycbyou6DqfDLxPoScbyPWYfVzltXDtUO4MBlqO1pRcn6KITdyw6Q8chZNh7U-A0w9kY7s/exec';

    // 整理某一天的報表資料（訂單明細 + 金額合計 + 現金/行動分類 + 品項統計）
    function buildReportData(dateStr) {
      const day = orders.filter(o => dayKey(o.createdAt) === dateStr && !o.rejected).sort((a, b) => a.createdAt - b.createdAt);
      const paid = day.filter(isPaid);
      const cash = paid.filter(o => o.pay && o.pay.method === 'cash');
      const mobile = paid.filter(o => o.pay && o.pay.method === 'mobile');
      const sum = arr => arr.reduce((s, o) => s + (o.total || 0), 0);
      const stat = {};
      day.forEach(o => (o.items || []).forEach(it => { const n = nameOf(it); if (!stat[n]) stat[n] = { qty: 0, rev: 0 }; stat[n].qty += it.qty; stat[n].rev += priceOf(it) * it.qty; }));
      const items = Object.keys(stat).map(name => ({ name, qty: stat[name].qty, rev: stat[name].rev })).sort((a, b) => b.qty - a.qty);
      return { dateStr, day, count: day.length, paidCount: paid.length, revenue: sum(paid), cashCount: cash.length, cashSum: sum(cash), mobileCount: mobile.length, mobileSum: sum(mobile), unpaidCount: day.length - paid.length, items };
    }

    function orderItemsText(o) {
      return (o.items || []).map(it => nameOf(it) + (it.temp ? '(' + it.temp + ')' : '') + (it.note ? '[' + it.note + ']' : '') + '×' + it.qty).join('、');
    }
    const payText = o => (o.pay && o.pay.paid) ? (o.pay.method === 'cash' ? '現金' : '行動') : '未結';

    // 依日期＋期間（day/week/month）算出起訖與標題
    function periodRange(dateStr, period) {
      const p = dateStr.split('-').map(Number);
      const y = p[0], m = p[1], d = p[2];
      let start, end, label;
      if (period === 'week') {
        const dow = (new Date(y, m - 1, d).getDay() + 6) % 7; // 週一=0
        start = new Date(y, m - 1, d - dow);
        end = new Date(start.getFullYear(), start.getMonth(), start.getDate() + 6);
        label = '週報　' + dayKey(start) + ' ～ ' + dayKey(end);
      } else if (period === 'month') {
        start = new Date(y, m - 1, 1);
        end = new Date(y, m, 0);
        label = '月報　' + y + '-' + String(m).padStart(2, '0');
      } else {
        start = new Date(y, m - 1, d);
        end = new Date(y, m - 1, d);
        label = '日報　' + dateStr;
      }
      start.setHours(0, 0, 0, 0); end.setHours(23, 59, 59, 999);
      return { start, end, label };
    }

    // 整理某一期間（日/週/月）的完整報表：營收/訂單/品項=真實歷史；成本/薪資/食材/設備=本月或目前快照
    function buildPeriodReport(dateStr, period) {
      const rg = periodRange(dateStr, period);
      const s = rg.start.getTime(), e = rg.end.getTime();
      const day = orders.filter(o => o.createdAt >= s && o.createdAt <= e && !o.rejected).sort((a, b) => a.createdAt - b.createdAt);
      const paid = day.filter(isPaid);
      const cash = paid.filter(o => o.pay && o.pay.method === 'cash');
      const mobile = paid.filter(o => o.pay && o.pay.method === 'mobile');
      const sum = arr => arr.reduce((acc, o) => acc + (o.total || 0), 0);
      const dineIn = day.filter(o => o.type === '內用').length;
      const takeout = day.length - dineIn;

      // 逐日明細
      const byDay = {};
      day.forEach(o => { const k = dayKey(o.createdAt); if (!byDay[k]) byDay[k] = { count: 0, revenue: 0, paidCount: 0 }; byDay[k].count++; if (isPaid(o)) { byDay[k].revenue += o.total || 0; byDay[k].paidCount++; } });
      const perDay = Object.keys(byDay).sort().map(k => ({ date: k, count: byDay[k].count, paidCount: byDay[k].paidCount, revenue: byDay[k].revenue }));

      // 品項統計
      const stat = {};
      day.forEach(o => (o.items || []).forEach(it => { const n = nameOf(it); if (!stat[n]) stat[n] = { qty: 0, rev: 0 }; stat[n].qty += it.qty; stat[n].rev += priceOf(it) * it.qty; }));
      const items = Object.keys(stat).map(n => ({ name: n, qty: stat[n].qty, rev: stat[n].rev })).sort((a, b) => b.qty - a.qty);

      // 分類營收（已結帳）
      const catMap = {};
      paid.forEach(o => (o.items || []).forEach(it => { const cn = catNameOf(it); catMap[cn] = (catMap[cn] || 0) + priceOf(it) * it.qty; }));
      const cats = Object.keys(catMap).map(n => ({ name: n, value: catMap[n] })).sort((a, b) => b.value - a.value);

      // 管理模組快照（本月／目前設定值）
      const ent = (cfg && cfg.ent) || {};
      const costs = ent.costs || [];
      const costTotal = costs.reduce((acc, c) => acc + (c.amount || 0), 0);
      const staffRows = (ent.staff || []).map(st => ({ name: st.name, role: st.role, wage: st.wage, hours: st.hours, pay: (st.wage || 0) * (st.hours || 0) }));
      const payrollTotal = staffRows.reduce((acc, r) => acc + r.pay, 0);
      const ingredients = ent.ingredients || [];
      const equipment = ent.equipment || [];
      const revenue = sum(paid);

      return {
        label: rg.label, period, start: rg.start, end: rg.end,
        count: day.length, paidCount: paid.length, unpaidCount: day.length - paid.length,
        revenue, cashCount: cash.length, cashSum: sum(cash), mobileCount: mobile.length, mobileSum: sum(mobile),
        dineIn, takeout, day, perDay, items, cats,
        costs, costTotal, staffRows, payrollTotal, ingredients, equipment,
        profit: revenue - costTotal - payrollTotal,
      };
    }

    // 營運報表預覽（日/週/月）：頁內預覽 → 列印或另存 PDF
    function printDayReport(dateStr) {
      if (!dateStr) { showMessage('請選擇日期'); return; }
      const r = buildPeriodReport(dateStr, reportPeriod);
      const isMonth = reportPeriod === 'month';
      const periodWord = reportPeriod === 'month' ? '本月' : reportPeriod === 'week' ? '本週' : '當日';

      const sumRows = `
        <table>
          <tr><th>${periodWord}訂單數</th><td>${r.count} 筆</td><th>已結帳</th><td>${r.paidCount} 筆</td><th>未結帳</th><td>${r.unpaidCount} 筆</td></tr>
          <tr><th>${periodWord}營收</th><td>$${r.revenue}</td><th>💵 現金</th><td>$${r.cashSum}（${r.cashCount}筆）</td><th>📱 行動</th><td>$${r.mobileSum}（${r.mobileCount}筆）</td></tr>
          <tr><th>內用</th><td>${r.dineIn} 筆</td><th>外帶</th><td>${r.takeout} 筆</td><th>平均客單</th><td>$${r.paidCount ? Math.round(r.revenue / r.paidCount) : 0}</td></tr>
        </table>`;

    // 同步當日報表到 Google Sheet（Apps Script Web App）
    async function syncDayToSheet(dateStr) {
      if (!dateStr) { showMessage('請選擇日期'); return; }
      const url = ((cfg && cfg.sheetUrl) || DEFAULT_SHEET_URL || '').trim();
      if (!url) { showMessage('請先填寫並儲存 Google Sheet 連結網址'); return; }
      const r = buildReportData(dateStr);
      const payload = {
        date: dateStr, store: '小魚乾早午餐',
        summary: { count: r.count, paidCount: r.paidCount, unpaidCount: r.unpaidCount, revenue: r.revenue, cashCount: r.cashCount, cashSum: r.cashSum, mobileCount: r.mobileCount, mobileSum: r.mobileSum },
        orders: r.day.map(o => ({ no: o.no, time: fmtTime(o.createdAt), typeTable: o.type + ' · ' + (o.table || ''), status: (STATUS[o.status] || {}).label || o.status || '', pay: payText(o), total: o.total || 0 })),
        items: r.items
      };
      try {
        await fetch(url, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'text/plain;charset=utf-8' }, body: JSON.stringify(payload) });
        showMessage('已送出到 Google Sheet，請到試算表確認 ✅');
      } catch (e) {
        showMessage('同步失敗：' + (e && e.message ? e.message : '請檢查網址'));
      }
    }
    function catNameOf(it) {
      for (const c of CURRENT_MENU) for (const i of c.items) if (i.id === it.id || i.name === it.name) return c.name;
      return '其他';
    }

    // ---------- 各分頁內容 ----------
    function tabRevenue() {
      const today = orders.filter(o => isToday(o.createdAt) && !o.rejected);
      const paid = today.filter(isPaid);
      const revenue = paid.reduce((s, o) => s + (o.total || 0), 0);
      const doneC = today.filter(o => o.status === 'done').length;
      const dineIn = today.filter(o => o.type === '內用').length;
      const takeout = today.length - dineIn;
      const cash = today.filter(o => o.pay && o.pay.paid && o.pay.method === 'cash').reduce((s, o) => s + o.total, 0);
      const mobile = today.filter(o => o.pay && o.pay.paid && o.pay.method === 'mobile').reduce((s, o) => s + o.total, 0);
      const unpaid = today.filter(o => !isPaid(o)).reduce((s, o) => s + (o.total || 0), 0);

      const catMap = {};
      paid.forEach(o => (o.items || []).forEach(it => {
        const cn = catNameOf(it);
        catMap[cn] = (catMap[cn] || 0) + priceOf(it) * it.qty;
      }));
      const catRows = Object.entries(catMap).map(([name, value]) => ({ name, value })).sort((a, b) => b.value - a.value);

      const itemMap = {};
      today.forEach(o => (o.items || []).forEach(it => {
        const n = nameOf(it);
        itemMap[n] = (itemMap[n] || 0) + it.qty;
      }));
      const topRows = Object.entries(itemMap).map(([name, value]) => ({ name, value })).sort((a, b) => b.value - a.value).slice(0, 6);

      const now = new Date();
      const dayRows = [];
      for (let i = 6; i >= 0; i--) {
        const d = new Date(now.getFullYear(), now.getMonth(), now.getDate() - i);
        const key = d.toDateString();
        const sum = orders.filter(o => isPaid(o) && new Date(o.createdAt).toDateString() === key).reduce((s, o) => s + (o.total || 0), 0);
        dayRows.push({ label: (d.getMonth() + 1) + '/' + d.getDate(), value: sum });
      }

      const payRows = [
        { name: '💵 現金', value: cash }, { name: '📱 行動支付', value: mobile }, { name: '⏳ 未結帳', value: unpaid },
      ].filter(r => r.value > 0);

      return `
        <div class="stats-grid">
          ${renderStat('今日訂單', today.length)}
          ${renderStat('已收營業額', '$' + revenue, 'var(--green)')}
          ${renderStat('已完成', doneC, 'var(--blue)')}
          ${renderStat('內用 / 外帶', dineIn + ' / ' + takeout, 'var(--pink)')}
        </div>
        <div class="admin-card"><h3>近 7 日營收</h3>${barChart(dayRows, v => '$' + v)}</div>
        <div class="admin-cols">
          <div class="admin-card"><h3>付款方式分布</h3>${rankList(payRows, v => '$' + v, '今天還沒有銷售紀錄')}</div>
          <div class="admin-card"><h3>今日分類營收</h3>${rankList(catRows, v => '$' + v, '今天還沒有完成的訂單')}</div>
          <div class="admin-card"><h3>今日熱銷排行</h3>${rankList(topRows, v => v + ' 份', '今天還沒有銷售紀錄')}</div>
        </div>`;
    }

    function tabOps() {
      const today = orders.filter(o => isToday(o.createdAt));
      const totalT = today.length;
      const completion = totalT ? Math.round(today.filter(o => o.status === 'done').length / totalT * 100) : 0;
      const avgItems = totalT ? (today.reduce((s, o) => s + (o.items || []).reduce((a, i) => a + i.qty, 0), 0) / totalT) : 0;
      const doneOrders = today.filter(o => o.status === 'done' && o.updatedAt && o.updatedAt > o.createdAt);
      const avgPrep = doneOrders.length ? Math.round(doneOrders.reduce((s, o) => s + (o.updatedAt - o.createdAt), 0) / doneOrders.length / 60000) : 0;
      const dineIn = today.filter(o => o.type === '內用').length;
      const takeout = totalT - dineIn;
      const hrs = [6, 7, 8, 9, 10, 11, 12];
      const hc = {};
      today.forEach(o => { const h = new Date(o.createdAt).getHours(); hc[h] = (hc[h] || 0) + 1; });
      const hourRows = hrs.map(h => ({ label: h + '時', value: hc[h] || 0 }));

      return `
        <div class="stats-grid">
          ${renderStat('今日訂單', totalT)}
          ${renderStat('完成率', completion + '%', 'var(--green)')}
          ${renderStat('平均每單品項', avgItems.toFixed(1), 'var(--pink)')}
          ${renderStat('平均出餐時間', avgPrep + ' 分', 'var(--amber)')}
        </div>
        <div class="admin-card"><h3>營業時段分布（今日訂單數）</h3>${barChart(hourRows)}</div>
        <div class="admin-card"><h3>即時營運概況</h3>
          ${[
            { name: '內用 / 外帶', value: dineIn + ' / ' + takeout },
            { name: '製作中 / 待製作', value: today.filter(o => o.status === 'cook').length + ' / ' + today.filter(o => o.status === 'new').length },
          ].map(r => `<div class="ent-row"><span style="font-weight:700;">${r.name}</span><span style="font-weight:900;color:var(--ink-soft);">${r.value}</span></div>`).join('')}
        </div>`;
    }

    function tabCost() {
      const now = new Date();
      const payrollTotal = (cfg.ent.staff || []).reduce((a, s) => a + (s.wage || 0) * (s.hours || 0), 0);
      const costRows = [
        ...(cfg.ent.costs || []).map(c => ({ label: c.label, amount: c.amount || 0, id: c.id, auto: false })),
        { label: '人事薪資（自動）', amount: payrollTotal, id: '_pay', auto: true },
      ];
      const costTotal = costRows.reduce((a, c) => a + c.amount, 0);
      const sameMonth = ts => { const d = new Date(ts); return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear(); };
      const monthOrders = orders.filter(o => isPaid(o) && sameMonth(o.createdAt));
      const monthRev = monthOrders.reduce((s, o) => s + (o.total || 0), 0);
      const monthCount = monthOrders.length;
      const profit = monthRev - costTotal;
      const margin = monthRev > 0 ? Math.round(profit / monthRev * 100) : 0; // 毛利率 %
      const avgOrder = monthCount ? Math.round(monthRev / monthCount) : 0;    // 客單價
      const avgProfit = monthCount ? Math.round(profit / monthCount) : 0;     // 平均每單利潤
      const maxCost = Math.max(1, ...costRows.map(c => c.amount));

      const bars = costRows.map(c => `
        <div class="rank-row">
          <div class="rank-head">
            <b>${escapeHtml(c.label)}</b>
            <span style="display:flex;align-items:center;gap:8px;color:var(--ink-soft);">
              ${money(c.amount)}
              ${c.auto ? '' : `<button class="mini-btn" data-action="ent-edit" data-kind="cost" data-id="${c.id}">編輯</button><button class="mini-btn" data-action="ent-del" data-kind="cost" data-id="${c.id}">🗑</button>`}
            </span>
          </div>
          <div class="rank-track"><div class="rank-fill" style="width:${Math.round(c.amount / maxCost * 100)}%;${c.auto ? 'background:linear-gradient(90deg,#6fb7d0,#3e9bd1);' : ''}"></div></div>
        </div>`).join('');

      return `
        <div class="stats-grid" style="grid-template-columns:repeat(4,1fr);">
          ${renderStat('本月營收', money(monthRev), 'var(--green)')}
          ${renderStat('本月成本', money(costTotal), '#e5534b')}
          ${renderStat('本月毛利', money(profit), profit >= 0 ? 'var(--green)' : '#e5534b')}
          ${renderStat('毛利率', margin + '%', margin >= 0 ? 'var(--green)' : '#e5534b')}
        </div>
        <div class="stats-grid" style="grid-template-columns:repeat(3,1fr);">
          ${renderStat('本月訂單數', monthCount)}
          ${renderStat('客單價', money(avgOrder), 'var(--blue)')}
          ${renderStat('平均每單利潤', money(avgProfit), avgProfit >= 0 ? 'var(--green)' : '#e5534b')}
        </div>
        <div class="admin-card">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
            <h3 style="margin:0;">本月成本明細</h3>
            <button class="add-btn" data-action="ent-add" data-kind="cost">＋ 新增成本</button>
          </div>
          ${bars}
        </div>`;
    }

    function tabHistory() {
      const today = orders.filter(o => isToday(o.createdAt));
      const pool = histScope === 'today' ? today : orders;

      const rowsHtml = list.map(o => {
        const st = o.rejected ? { label: '已拒單', color: '#e5534b', bg: '#fdecea' } : (STATUS[o.status] || STATUS.new);
        const pd = o.pay && o.pay.paid;
        const payLabel = o.rejected ? '—' : (pd ? (o.pay.method === 'cash' ? '💵 現金' : '📱 行動') : '未結');
        const when = histScope === 'today' ? fmtTime(o.createdAt) : (fmtDate(o.createdAt) + ' ' + fmtTime(o.createdAt));
        const itemsText = orderItemsText(o) || '—';
        return `<tr>
          <td style="font-weight:900;color:var(--pink);">${o.no}</td>

          <td><span class="badge" style="background:${st.bg};color:${st.color};">${st.label}</span></td>
          <td style="color:${pd ? '#3fa877' : '#9db4bf'};font-weight:700;">${payLabel}</td>
          <td style="font-weight:900;text-align:right;">$${o.total}</td>
          <td style="text-align:center;"><button class="mini-btn" data-action="hist-del" data-id="${o.id}" style="background:#fdecea;color:#e5534b;border:none;">🗑 刪除</button></td>
        </tr>`;

      const tbtn = on => `border-radius:999px;padding:7px 14px;font-size:13px;font-weight:700;cursor:pointer;${on ? 'border:none;background:var(--ink);color:#fff;' : 'border:1.5px solid var(--line);background:#fff;color:var(--ink-soft);'}`;
      return `
        <div class="admin-card" style="margin-bottom:14px;">
          <h3 style="margin:0 0 10px;">📑 營運報表（日／週／月）</h3>
          <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
            <label style="font-size:13px;">日期</label>
            <input type="date" id="hist-date" value="${dayKey(Date.now())}" style="border:1.5px solid var(--line);border-radius:10px;padding:8px 10px;">
            <div style="display:flex;gap:6px;">
              <button data-action="rpt-day" style="${tbtn(reportPeriod === 'day')}">日報</button>
              <button data-action="rpt-week" style="${tbtn(reportPeriod === 'week')}">週報</button>
              <button data-action="rpt-month" style="${tbtn(reportPeriod === 'month')}">月報</button>
            </div>
            <button class="add-btn" data-action="hist-print">🖨️ 列印 / 另存 PDF</button>
            <button class="add-btn" data-action="hist-sync">📊 同步到 Google Sheet</button>
          </div>
          <div style="font-size:12px;color:var(--ink-soft);margin-top:6px;">營收／訂單／品項為真實歷史資料；成本／薪資／食材／設備為本月或目前設定值快照。</div>
          <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:10px;">
            <label style="font-size:12px;color:var(--ink-soft);white-space:nowrap;">Google Sheet 連結</label>
            <input id="sheet-url" placeholder="貼上 Apps Script Web App 網址" value="${escapeHtml(cfg.sheetUrl || DEFAULT_SHEET_URL)}" style="flex:1;min-width:200px;border:1.5px solid var(--line);border-radius:10px;padding:8px 10px;">
            <button class="mini-btn" data-action="hist-save-sheet">儲存</button>
          </div>
        </div>
        <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:14px;">
          <div style="display:flex;gap:8px;">
            <button data-action="hist-today" style="${tbtn(histScope === 'today')}">今日</button>
            <button data-action="hist-all" style="${tbtn(histScope === 'all')}">全部</button>
          </div>
          <div style="font-size:14px;">營收：<b style="color:var(--green);">$${rev}</b> · 共 ${list.length} 筆</div>
        </div>
        <div class="admin-card">
          ${list.length ? `<table class="hist-table"><thead><tr><th>單號</th><th>時間</th><th>類型 / 桌號</th><th>品項</th><th>狀態</th><th>付款</th><th style="text-align:right;">金額</th><th style="text-align:center;">操作</th></tr></thead><tbody>${rowsHtml}</tbody></table>` : '<div style="color:#9db4bf;padding:10px 0;">沒有訂單紀錄</div>'}
        </div>`;
    }

    // ---------- 編輯彈窗 ----------
    function fieldDefs(kind) {
      if (kind === 'staff') return [{ key: 'name', label: '姓名', type: 'text' }, { key: 'role', label: '職務', type: 'text' }, { key: 'wage', label: '時薪', type: 'number' }, { key: 'hours', label: '本月時數', type: 'number' }];
      if (kind === 'ingredient') return [{ key: 'name', label: '品名', type: 'text' }, { key: 'unit', label: '單位', type: 'text' }, { key: 'stock', label: '目前庫存', type: 'number' }, { key: 'lowAt', label: '安全庫存', type: 'number' }, { key: 'supplier', label: '供應商', type: 'text' }];
      if (kind === 'equipment') return [{ key: 'name', label: '設備名稱', type: 'text' }, { key: 'lastService', label: '上次保養（例 2026/06/01）', type: 'text' }];
      if (kind === 'cost') return [{ key: 'label', label: '成本項目', type: 'text' }, { key: 'amount', label: '本月金額', type: 'number' }];
      return [];
    }
    const entListKey = kind => kind === 'staff' ? 'staff' : kind === 'ingredient' ? 'ingredients' : kind === 'equipment' ? 'equipment' : 'costs';

    function renderModals() {
      let html = '';
      if (editItem) {
        html += `
          <div class="pin-overlay"><div class="pin-box" style="max-width:320px;">
            <h3 style="font-size:17px;font-weight:900;margin:0 0 14px;">${editItem.isNew ? '新增品項' : '編輯品項'}</h3>

            <div style="font-size:12px;color:var(--ink-soft);margin-top:4px;text-align:left;">顧客點此品項時可一鍵勾選；留空則用該分類預設選項。</div>
            <div style="margin-top:12px;text-align:left;">
              <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:8px;">
                <div style="font-size:12px;color:var(--ink-soft);font-weight:700;">💰 加價選項（後台記錄用，不影響顧客點餐與總價）</div>
                <button class="mini-btn" data-action="addon-add" style="flex:none;">＋ 新增</button>
              </div>
              ${(editItem.addons || []).length ? (editItem.addons || []).map((ad, i) => `
              <div style="display:flex;align-items:center;gap:6px;margin-bottom:8px;">
                <span style="color:var(--pink);font-weight:900;">+$</span>
                <input id="item-addon-price-${i}" type="number" placeholder="金額" value="${ad.price != null ? escapeHtml(String(ad.price)) : ''}" style="width:74px;flex:none;box-sizing:border-box;text-align:left;letter-spacing:normal;margin:0;" />
                <input id="item-addon-name-${i}" placeholder="加價項目名稱（例：加蛋）" value="${escapeHtml(ad.name || '')}" style="flex:1;width:auto;box-sizing:border-box;text-align:left;letter-spacing:normal;margin:0;" />
                <button class="mini-btn" data-action="addon-del" data-idx="${i}" style="flex:none;">🗑</button>
              </div>`).join('') : '<div style="font-size:12px;color:#9db4bf;padding:2px 0 4px;">尚無加價選項，按右上「＋ 新增」加入。</div>'}
            </div>
            <div id="item-autosave" style="font-size:12px;color:var(--green);font-weight:700;text-align:right;min-height:16px;margin-top:6px;">${autoSaveStatus === 'saving' ? '儲存中…' : autoSaveStatus === 'saved' ? '✓ 已自動儲存' : ''}</div>
            <div class="pin-actions">
              <button class="pill-button" style="flex:1;" data-action="item-cancel">${editItem.autoSaved ? '關閉' : '取消'}</button>
              <button data-action="item-save" style="flex:1;border:none;background:var(--pink);color:#fff;font-weight:900;padding:11px;border-radius:12px;">儲存</button>
            </div>
          </div></div>`;
      }
      if (editEnt) {
        const defs = fieldDefs(editEnt.kind);
        const kindLabel = { staff: '員工', ingredient: '食材', equipment: '設備', cost: '成本項目' }[editEnt.kind] || '';
        html += `
          <div class="pin-overlay"><div class="pin-box" style="max-width:360px;">
            <h3 style="font-size:17px;font-weight:900;margin:0 0 14px;">${editEnt.isNew ? '新增' : '編輯'}${kindLabel}</h3>
            ${defs.map(d => `<input id="ent-${d.key}" type="${d.type === 'number' ? 'number' : 'text'}" placeholder="${d.label}" value="${escapeHtml(editEnt.data[d.key] != null ? String(editEnt.data[d.key]) : '')}" style="text-align:left;letter-spacing:normal;margin-bottom:8px;" />`).join('')}
            <div class="pin-actions">
              <button class="pill-button" style="flex:1;" data-action="ent-cancel">取消</button>

    // ---------- 主渲染 ----------
    function renderAdmin() {
      // 記住捲動位置：整頁垂直 + 分頁橫桿(.admin-tabs)的橫向捲動，重建 DOM 後還原，避免點擊後跳回最前面
      const _scrollY = window.scrollY;
      const _tabsBar = app.querySelector('.admin-tabs');
      const _tabsLeft = _tabsBar ? _tabsBar.scrollLeft : 0;
      const bodyFns = { revenue: tabRevenue, ops: tabOps, cost: tabCost, payroll: tabPayroll, ing: tabIng, equip: tabEquip, menu: tabMenu, history: tabHistory };
      app.innerHTML = `
        <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:14px;">
          <div style="display:flex;align-items:center;gap:8px;font-size:13px;color:var(--ink-soft);">📊 ${syncModeLabel()} · 自動更新</div>
          <button id="logout-btn" class="pill-button">🔓 登出</button>
        </div>
        <div class="admin-tabs">${ADMIN_TABS.map(t => `<button class="admin-tab${t.k === aTab ? ' active' : ''}" data-tab="${t.k}">${t.label}</button>`).join('')}</div>
        ${(bodyFns[aTab] || tabRevenue)()}
        ${renderModals()}
      `;
      bindAdmin();
      const _newTabsBar = app.querySelector('.admin-tabs');
      if (_newTabsBar) _newTabsBar.scrollLeft = _tabsLeft;
      window.scrollTo(0, _scrollY);
    }

    function bindAdmin() {
      const logout = document.getElementById('logout-btn');
      if (logout) logout.addEventListener('click', () => { unlocked = false; try { localStorage.removeItem(ADMIN_AUTH_KEY); } catch (e) {} renderLogin(); });
      app.querySelectorAll('[data-tab]').forEach(b => b.addEventListener('click', () => { aTab = b.dataset.tab; renderAdmin(); }));
      app.querySelectorAll('[data-action]').forEach(b => b.addEventListener('click', () => handleAction(b)));
      // 品項彈窗：任何欄位變動都排程一次自動儲存
      if (editItem) {
        const ids = ['item-name', 'item-price', 'item-opts'];
        (editItem.addons || []).forEach((_, i) => ids.push('item-addon-name-' + i, 'item-addon-price-' + i));
        ids.forEach(id => { const el = document.getElementById(id); if (el) el.addEventListener('input', scheduleAutoSave); });
      }
    }

    // 會寫入設定的動作；雲端資料還沒載入完就執行會用預設值覆蓋掉雲端真實資料
    const WRITE_ACTIONS = [
      // → saveMenu
      'item-save', 'item-del', 'item-active', 'item-sold', 'cat-add', 'cat-del', 'cat-rename', 'menu-reset-default',
      // → saveEnt
      'ent-save', 'ent-del', 'ing-plus', 'ing-minus', 'eq-cycle',
      // → saveConfig
      'save-close-time', 'hist-save-sheet',
    ];

    function handleAction(b) {
      const a = b.dataset.action;
      const cat = b.dataset.cat, id = b.dataset.id, kind = b.dataset.kind;
      if (WRITE_ACTIONS.indexOf(a) !== -1 && !isConfigLoaded()) {
        showMessage('⚠️ 雲端資料尚未載入完成，請稍候再操作（避免覆蓋既有資料）');
        return;
      }
      if (a === 'hist-today') { histScope = 'today'; renderAdmin(); }
      else if (a === 'hist-all') { histScope = 'all'; renderAdmin(); }
      else if (a === 'hist-del') { if (confirm('確定刪除這筆訂單？此動作無法復原，且會從雲端同步移除。')) syncDeleteOrder(id); }
      else if (a === 'rpt-day') { reportPeriod = 'day'; renderAdmin(); }
      else if (a === 'rpt-week') { reportPeriod = 'week'; renderAdmin(); }
      else if (a === 'rpt-month') { reportPeriod = 'month'; renderAdmin(); }
      else if (a === 'hist-print') { const el = document.getElementById('hist-date'); printDayReport(el ? el.value : ''); }
      else if (a === 'hist-sync') { const el = document.getElementById('hist-date'); syncDayToSheet(el ? el.value : ''); }
      else if (a === 'hist-save-sheet') { const el = document.getElementById('sheet-url'); cfg = Object.assign({}, cfg, { sheetUrl: el ? el.value.trim() : '' }); saveConfig(cfg); showMessage('已儲存 Google Sheet 連結'); }
      else if (a === 'save-close-time') { const el = document.getElementById('close-time'); const en = document.getElementById('close-enabled'); cfg = Object.assign({}, cfg, { closeTime: (el && el.value) || '11:50', closeEnabled: !!(en && en.checked) }); saveConfig(cfg); showMessage(cfg.closeEnabled ? ('已啟用結單時間：' + cfg.closeTime) : '已暫停結單（測試模式）'); }
      else if (a === 'menu-reset-default') { resetMenuToDefault(); }
      else if (a === 'cat-add') { addCategory(); }
      else if (a === 'cat-rename') { renameCategory(cat); }
      else if (a === 'cat-del') { deleteCategory(cat); }
      else if (a === 'item-active') { toggleItem(cat, id, 'active'); }
      else if (a === 'item-sold') { toggleItem(cat, id, 'soldOut'); }
      else if (a === 'item-del') { if (confirm('確定刪除此品項？')) deleteItem(cat, id); }
      else if (a === 'item-edit') { const it = findItem(cat, id); editItem = { catId: cat, id, name: it.name, price: it.price, opts: (it.opts || []).join('\n'), addons: loadAddons(it), isNew: false }; autoSaveStatus = ''; renderAdmin(); }
      else if (a === 'item-add') { editItem = { catId: cat, name: '', price: '', opts: '', addons: [], isNew: true }; autoSaveStatus = ''; renderAdmin(); }
      else if (a === 'addon-add') { captureItemModal(); editItem.addons = [...(editItem.addons || []), { name: '', price: '' }]; renderAdmin(); }
      else if (a === 'addon-del') { captureItemModal(); const ix = parseInt(b.dataset.idx, 10); editItem.addons = (editItem.addons || []).filter((_, i) => i !== ix); renderAdmin(); scheduleAutoSave(); }
      else if (a === 'item-cancel') { if (autoSaveTimer) { clearTimeout(autoSaveTimer); autoSaveTimer = null; } editItem = null; autoSaveStatus = ''; renderAdmin(); }
      else if (a === 'item-save') { saveItem(); }
      else if (a === 'ent-add') { openEnt(kind, null); }
      else if (a === 'ent-edit') { openEnt(kind, id); }
      else if (a === 'ent-del') { if (confirm('確定刪除？')) deleteEnt(kind, id); }
      else if (a === 'ent-cancel') { editEnt = null; renderAdmin(); }
      else if (a === 'ent-save') { commitEnt(); }
      else if (a === 'eq-cycle') { cycleStatus(id); }
      else if (a === 'ing-plus') { adjustStock(id, 1); }
      else if (a === 'ing-minus') { adjustStock(id, -1); }
    }

    // ---------- 菜單操作 ----------
    function resetMenuToDefault() {
      if (!confirm('確定要「重設成程式預設菜單」嗎？\n\n會用程式內建的預設菜單（含最新完整品名）覆蓋掉目前雲端的菜單設定。\n你手動新增／改名／改價／下架售完的設定都會被清掉，全部品項恢復上架、不售完。\n此動作無法復原。')) return;
      // 從內建常數 MENU 重建（不是用 CURRENT_MENU，因為它可能已被雲端舊設定覆蓋）
      const fresh = MENU.map(cat => Object.assign({}, JSON.parse(JSON.stringify(cat)), {
        items: cat.items.map(it => Object.assign({ active: true, soldOut: false }, JSON.parse(JSON.stringify(it)))),
      }));
      cfg.menu = fresh;
      saveMenu(cfg.menu); renderAdmin();
      showMessage('已重設成程式預設菜單');
    }
    function addCategory() {
      const name = (prompt('新增大類名稱（例：三明治系列）') || '').trim();
      if (!name) return;
      const icon = (prompt('分類圖示 emoji（可留空，預設 🍽️）', '🥪') || '🍽️').trim() || '🍽️';
      const nid = 'cat' + Date.now();
      cfg.menu = [...cfg.menu, { id: nid, name, icon, items: [] }];
      saveMenu(cfg.menu); renderAdmin();
    }
    function renameCategory(catId) {
      const c = cfg.menu.find(x => x.id === catId); if (!c) return;
      const name = prompt('修改大類名稱', c.name); if (name === null) return;
      const icon = prompt('修改圖示 emoji', c.icon || '🍽️'); if (icon === null) return;
      cfg.menu = cfg.menu.map(x => x.id !== catId ? x : Object.assign({}, x, { name: (name || '').trim() || x.name, icon: (icon || '').trim() || x.icon }));
      saveMenu(cfg.menu); renderAdmin();
    }
    function deleteCategory(catId) {
      const c = cfg.menu.find(x => x.id === catId); if (!c) return;
      if (!confirm(`確定刪除大類「${c.name}」？\n其下 ${c.items.length} 個品項會一併刪除。`)) return;
      cfg.menu = cfg.menu.filter(x => x.id !== catId);
      saveMenu(cfg.menu); renderAdmin();
    }
    function findItem(catId, id) { const c = cfg.menu.find(x => x.id === catId); return c ? c.items.find(i => i.id === id) : null; }
    function toggleItem(catId, id, field) {
      cfg.menu = cfg.menu.map(c => c.id !== catId ? c : Object.assign({}, c, { items: c.items.map(i => i.id !== id ? i : Object.assign({}, i, { [field]: !i[field] })) }));
      saveMenu(cfg.menu); renderAdmin();
    }
    function deleteItem(catId, id) {
      cfg.menu = cfg.menu.map(c => c.id !== catId ? c : Object.assign({}, c, { items: c.items.filter(i => i.id !== id) }));
      saveMenu(cfg.menu); renderAdmin();
    }
    // 讀取品項既有的加價選項；相容舊的 add5/add10/add15 欄位（自動轉成清單）
    function loadAddons(it) {
      let list = Array.isArray(it.addons) ? it.addons.map(a => ({ name: a.name || '', price: a.price != null ? a.price : '' })) : [];
      if (!list.length) {
        [['5', it.add5], ['10', it.add10], ['15', it.add15]].forEach(([p, nm]) => { if (nm) list.push({ name: nm, price: parseInt(p, 10) }); });
      }
      return list;
    }
    // 重建彈窗前，先把目前輸入框的值寫回 editItem，避免新增/刪除加價列時遺失
    function captureItemModal() {
      if (!editItem) return;
      const n = document.getElementById('item-name'); if (n) editItem.name = n.value;
      const p = document.getElementById('item-price'); if (p) editItem.price = p.value;
      const o = document.getElementById('item-opts'); if (o) editItem.opts = o.value;
      (editItem.addons || []).forEach((ad, i) => {
        const nm = document.getElementById('item-addon-name-' + i);
        const pr = document.getElementById('item-addon-price-' + i);
        if (nm) ad.name = nm.value;
        if (pr) ad.price = pr.value;
      });
    }
    // 把彈窗目前內容寫進 cfg.menu；回傳 false = 品名或價格還沒填完，不動資料
    function applyItemToMenu() {
      captureItemModal();
      const name = (editItem.name || '').trim();
      const price = parseInt(editItem.price, 10);
      if (!name || !(price >= 0)) return false;
      const opts = (editItem.opts || '').split('\n').map(s => s.trim()).filter(Boolean);
      // 只保留「有填名稱且金額為有效數字」的加價選項，空白列自動略過
      const addons = (editItem.addons || []).map(a => ({ name: (a.name || '').trim(), price: parseInt(a.price, 10) })).filter(a => a.name && !isNaN(a.price) && a.price >= 0);
      if (editItem.isNew) {
        const nid = 'x' + Date.now();
        editItem.id = nid;
        editItem.isNew = false; // 已建立，之後改為「更新」，避免每次自動儲存都新增一筆
        cfg.menu = cfg.menu.map(c => c.id !== editItem.catId ? c : Object.assign({}, c, { items: [...c.items, { id: nid, name, price, opts, addons, active: true, soldOut: false }] }));
      } else {
        cfg.menu = cfg.menu.map(c => c.id !== editItem.catId ? c : Object.assign({}, c, { items: c.items.map(i => i.id !== editItem.id ? i : Object.assign({}, i, { name, price, opts, addons })) }));
      }
      return true;
    }

    // ---------- 自動儲存：品名與價格都填好後，停止輸入約 1.2 秒就寫入雲端 ----------
    let autoSaveTimer = null;
    function setAutoStatus(s) {
      autoSaveStatus = s;
      const el = document.getElementById('item-autosave');
      if (el) el.textContent = s === 'saving' ? '儲存中…' : s === 'saved' ? '✓ 已自動儲存' : '';
    }
    function scheduleAutoSave() {
      captureItemModal(); // 先把輸入值收進 editItem，避免中途重繪遺失
      if (autoSaveTimer) clearTimeout(autoSaveTimer);
      autoSaveTimer = setTimeout(autoSaveItem, 1200);
    }
    function autoSaveItem() {
      autoSaveTimer = null;
      if (!editItem) return;
      if (!isConfigLoaded()) return; // 雲端還沒載入完成，一律不寫入
      if (!applyItemToMenu()) return; // 必填欄位還沒填完，安靜等待
      editItem.autoSaved = true;
      setAutoStatus('saving');
      Promise.resolve(saveMenu(cfg.menu))
        .then(() => setAutoStatus('saved'))
        .catch(() => setAutoStatus(''));
    }

    function saveItem() {
      if (autoSaveTimer) { clearTimeout(autoSaveTimer); autoSaveTimer = null; }
      if (!applyItemToMenu()) { showMessage('請填寫品名與價格'); return; }
      editItem = null; autoSaveStatus = ''; saveMenu(cfg.menu); renderAdmin();
    }

    // ---------- 營運資料操作 ----------
    function openEnt(kind, id) {
      const data = {};
      const item = id ? (cfg.ent[entListKey(kind)] || []).find(x => x.id === id) : null;
      fieldDefs(kind).forEach(d => { data[d.key] = item ? item[d.key] : ''; });
      editEnt = { kind, id: id || null, isNew: !item, data };
      renderAdmin();
    }
    function commitEnt() {
      const defs = fieldDefs(editEnt.kind); const rec = {};
      for (const d of defs) { let v = document.getElementById('ent-' + d.key).value; if (d.type === 'number') { v = parseFloat(v); if (isNaN(v)) v = 0; } else v = (v || '').trim(); rec[d.key] = v; }
      if (!rec[defs[0].key]) { showMessage('請填寫' + defs[0].label); return; }
      const lk = entListKey(editEnt.kind); const list = (cfg.ent[lk] || []).slice();
      if (editEnt.isNew) { rec.id = editEnt.kind + Date.now(); if (editEnt.kind === 'equipment') rec.status = '正常'; list.push(rec); }
      else { const i = list.findIndex(x => x.id === editEnt.id); if (i >= 0) list[i] = Object.assign({}, list[i], rec); }
      cfg.ent = Object.assign({}, cfg.ent, { [lk]: list }); editEnt = null; saveEnt(cfg.ent); renderAdmin();
    }
    function deleteEnt(kind, id) {
      const lk = entListKey(kind);
      cfg.ent = Object.assign({}, cfg.ent, { [lk]: (cfg.ent[lk] || []).filter(x => x.id !== id) });
      saveEnt(cfg.ent); renderAdmin();
    }
    function cycleStatus(id) {
      const order = ['正常', '保養中', '維修中'];
      cfg.ent = Object.assign({}, cfg.ent, { equipment: (cfg.ent.equipment || []).map(x => x.id !== id ? x : Object.assign({}, x, { status: order[(order.indexOf(x.status) + 1) % 3] })) });
      saveEnt(cfg.ent); renderAdmin();
    }
    function adjustStock(id, delta) {
      cfg.ent = Object.assign({}, cfg.ent, { ingredients: (cfg.ent.ingredients || []).map(x => x.id !== id ? x : Object.assign({}, x, { stock: Math.max(0, (x.stock || 0) + delta) })) });
      saveEnt(cfg.ent); renderAdmin();
    }

    // ---------- 啟動 ----------
    try { unlocked = localStorage.getItem(ADMIN_AUTH_KEY) === '1'; } catch (e) { unlocked = false; }
    if (unlocked) renderAdmin(); else renderLogin();

    initSync(list => {
      orders = list;
      if (unlocked && !editItem && !editEnt) renderAdmin();
    });

    initConfig(c => {
      cfg = c;
      if (unlocked && !editItem && !editEnt) renderAdmin();
    });

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(err => console.warn('Service Worker failed:', err));
    }
  </script>
</body>
</html>
